<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MXGNS Character Counter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eef0f3;
      --surface: #ffffff;
      --border: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --header-bg: #1e293b;
      --panel-head-bg: #f9fafb;
      --accent: #2563eb;
      --ok: #16a34a;
      --warn: #d97706;
      --over: #dc2626;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background: var(--header-bg);
      color: #f1f5f9;
      padding: 0 24px;
      height: 44px;
      display: flex;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 24px 24px;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
      min-height: 0;
    }

    .settings {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .settings label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .settings input[type="number"] {
      width: 90px;
      padding: 5px 9px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .settings input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .panels {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 0;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-head {
      background: var(--panel-head-bg);
      border-bottom: 1px solid var(--border);
      padding: 7px 14px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      padding: 14px 16px;
      border: none;
      resize: none;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
      background: var(--surface);
      outline: none;
      min-height: 400px;
    }

    textarea::placeholder { color: #c4c8d0; }

    .counter-row {
      border-top: 1px solid var(--border);
      background: var(--panel-head-bg);
      padding: 8px 16px;
      display: flex;
      align-items: baseline;
      gap: 5px;
      flex-shrink: 0;
    }

    .count-label {
      font-size: 11px;
      color: var(--muted);
      margin-right: auto;
      letter-spacing: 0.03em;
    }

    .count-num {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 26px;
      font-weight: 700;
      color: var(--ok);
      transition: color 0.2s ease;
      line-height: 1;
    }

    .count-num.warn { color: var(--warn); }
    .count-num.over { color: var(--over); }

    .count-sep,
    .count-max {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      color: var(--muted);
    }

    /* Preview panel */
    .preview-body {
      flex: 1;
      padding: 14px 16px;
      overflow-y: auto;
      font-size: 15px;
      line-height: 1.7;
      min-height: 400px;
    }

    .preview-empty {
      color: #c4c8d0;
      font-style: italic;
      font-size: 14px;
    }

    .preview-body h1,
    .preview-body h2,
    .preview-body h3,
    .preview-body h4,
    .preview-body h5,
    .preview-body h6 {
      margin: 1em 0 0.4em;
      line-height: 1.3;
      font-weight: 600;
    }

    .preview-body > h1:first-child,
    .preview-body > h2:first-child,
    .preview-body > h3:first-child { margin-top: 0; }

    .preview-body h1 { font-size: 22px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .preview-body h2 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .preview-body h3 { font-size: 16px; }
    .preview-body h4 { font-size: 14px; font-weight: 700; }

    .preview-body p { margin-bottom: 10px; }
    .preview-body p:last-child { margin-bottom: 0; }

    .preview-body ul,
    .preview-body ol { margin: 6px 0 10px 22px; }
    .preview-body li { margin-bottom: 3px; }

    .preview-body code {
      background: #f1f3f5;
      border: 1px solid #e2e5ea;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12.5px;
    }

    .preview-body pre {
      background: #1e293b;
      color: #cbd5e1;
      border-radius: 5px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .preview-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: 13px;
    }

    .preview-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 3px 0 3px 14px;
      margin: 10px 0;
      color: var(--muted);
    }

    .preview-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .preview-body a {
      color: var(--accent);
      text-decoration: none;
    }

    .preview-body a:hover { text-decoration: underline; }
    .preview-body strong { font-weight: 600; }
    .preview-body em { font-style: italic; }

    .preview-body img {
      max-width: 100%;
      border-radius: 4px;
      display: block;
      margin: 8px 0;
    }

    @media (max-width: 760px) {
      .panels { grid-template-columns: 1fr; }
      main { padding: 12px 16px 20px; }
    }
  </style>
</head>
<body>

  <header>MXGNS character counter</header>

  <main>
    <div class="settings">
      <label for="max-input">Max characters</label>
      <input type="number" id="max-input" value="200" min="1" step="1">
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-head">Text</div>
        <textarea id="text-input" placeholder="Start typing here…"></textarea>
        <div class="counter-row">
          <span class="count-label">chars (markdown syntax excluded)</span>
          <span class="count-num" id="count-num">0</span>
          <span class="count-sep">/</span>
          <span class="count-max" id="count-max">200</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">Preview</div>
        <div class="preview-body" id="preview">
          <span class="preview-empty">Start typing to see a rendered preview…</span>
        </div>
      </div>
    </div>
  </main>

  <script>
    const textEl    = document.getElementById('text-input');
    const maxEl     = document.getElementById('max-input');
    const countNum  = document.getElementById('count-num');
    const countMax  = document.getElementById('count-max');
    const previewEl = document.getElementById('preview');

    // ---------------------------------------------------------------------------
    // Character counting — strip markdown syntax, keep visible content
    // ---------------------------------------------------------------------------

    function stripMarkdown(t) {
      t = t.replace(/```[^\n]*\n?([\s\S]*?)```/g, '$1');  // fenced code → content
      t = t.replace(/`([^`\n]+)`/g, '$1');                // inline code → content
      t = t.replace(/!\[([^\]]*)\]\([^)]*\)/g, '$1');     // images → alt text
      t = t.replace(/\[([^\]]*)\]\([^)]*\)/g, '$1');      // links → link text
      t = t.replace(/\*{3}([^*]+)\*{3}/g, '$1');          // ***bold+italic***
      t = t.replace(/_{3}([^_]+)_{3}/g, '$1');
      t = t.replace(/\*{2}([^*]+)\*{2}/g, '$1');          // **bold**
      t = t.replace(/_{2}([^_]+)_{2}/g, '$1');
      t = t.replace(/\*([^*\n]+)\*/g, '$1');              // *italic*
      t = t.replace(/_([^_\n]+)_/g, '$1');
      t = t.replace(/^#{1,6} +/gm, '');                   // # headers
      t = t.replace(/^> */gm, '');                        // > blockquotes
      t = t.replace(/^[ \t]*[-*_]{3,}[ \t]*$/gm, '');    // --- hr
      t = t.replace(/^[ \t]*[-*+] +/gm, '');             // - list items
      t = t.replace(/^[ \t]*\d+\. +/gm, '');             // 1. ordered list
      return t;
    }

    // ---------------------------------------------------------------------------
    // Markdown renderer for the preview panel
    // ---------------------------------------------------------------------------

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function processInline(s) {
      // Protect inline code first so its content isn't processed
      const saved = [];
      s = s.replace(/`([^`]+)`/g, (_, code) => {
        const id = saved.length;
        saved.push('<code>' + esc(code) + '</code>');
        return '\x01' + id + '\x01';
      });

      s = esc(s);

      // Images before links
      s = s.replace(/!\[([^\]]*)\]\(([^)]*)\)/g, '<img src="$2" alt="$1">');
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
        '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      s = s.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/(?<!\w)__(.+?)__(?!\w)/g, '<strong>$1</strong>');
      s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      s = s.replace(/(?<!\w)_([^_\n]+)_(?!\w)/g, '<em>$1</em>');

      saved.forEach((html, id) => {
        s = s.split('\x01' + id + '\x01').join(html);
      });

      return s;
    }

    function renderMarkdown(text) {
      if (!text.trim()) {
        return '<span class="preview-empty">Start typing to see a rendered preview…</span>';
      }

      const codeBlocks = [];
      text = text.replace(/```([^\n]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        const id = codeBlocks.length;
        codeBlocks.push('<pre><code>' + esc(code.trimEnd()) + '</code></pre>');
        return '\x00BLOCK' + id + '\x00';
      });

      const lines = text.split('\n');
      const out = [];
      let i = 0;

      while (i < lines.length) {
        const line = lines[i];

        // Code block placeholder
        const bm = line.match(/^\x00BLOCK(\d+)\x00$/);
        if (bm) {
          out.push(codeBlocks[+bm[1]]);
          i++;
          continue;
        }

        // Horizontal rule
        if (/^[ \t]*([-*_][ \t]*){3,}$/.test(line)) {
          out.push('<hr>');
          i++;
          continue;
        }

        // Headers
        const hm = line.match(/^(#{1,6}) +(.+)$/);
        if (hm) {
          const lvl = hm[1].length;
          out.push('<h' + lvl + '>' + processInline(hm[2]) + '</h' + lvl + '>');
          i++;
          continue;
        }

        // Blockquote
        if (line.startsWith('>')) {
          const bqLines = [];
          while (i < lines.length && lines[i].startsWith('>')) {
            bqLines.push(lines[i].replace(/^> ?/, ''));
            i++;
          }
          out.push('<blockquote><p>' + processInline(bqLines.join('<br>')) + '</p></blockquote>');
          continue;
        }

        // Unordered list
        if (/^[ \t]*[-*+] /.test(line)) {
          const items = [];
          while (i < lines.length && /^[ \t]*[-*+] /.test(lines[i])) {
            items.push('<li>' + processInline(lines[i].replace(/^[ \t]*[-*+] +/, '')) + '</li>');
            i++;
          }
          out.push('<ul>' + items.join('') + '</ul>');
          continue;
        }

        // Ordered list
        if (/^[ \t]*\d+\. /.test(line)) {
          const items = [];
          while (i < lines.length && /^[ \t]*\d+\. /.test(lines[i])) {
            items.push('<li>' + processInline(lines[i].replace(/^[ \t]*\d+\. +/, '')) + '</li>');
            i++;
          }
          out.push('<ol>' + items.join('') + '</ol>');
          continue;
        }

        // Empty line
        if (!line.trim()) {
          i++;
          continue;
        }

        // Paragraph — collect consecutive non-special lines
        const para = [];
        while (i < lines.length) {
          const l = lines[i];
          if (!l.trim() ||
              /^\x00BLOCK/.test(l) ||
              /^[ \t]*([-*_][ \t]*){3,}$/.test(l) ||
              /^#{1,6} /.test(l) ||
              l.startsWith('>') ||
              /^[ \t]*[-*+] /.test(l) ||
              /^[ \t]*\d+\. /.test(l)) break;
          para.push(l);
          i++;
        }
        if (para.length) {
          out.push('<p>' + processInline(para.join('<br>')) + '</p>');
        }
      }

      return out.join('\n') || '<span class="preview-empty">Start typing to see a rendered preview…</span>';
    }

    // ---------------------------------------------------------------------------
    // Update loop
    // ---------------------------------------------------------------------------

    function update() {
      const max   = Math.max(1, parseInt(maxEl.value) || 200);
      const raw   = textEl.value;
      const count = stripMarkdown(raw).length;

      countNum.textContent = count;
      countMax.textContent = max;

      countNum.className = 'count-num';
      if (count >= max) {
        countNum.classList.add('over');
      } else if (count >= max - 10) {
        countNum.classList.add('warn');
      }

      previewEl.innerHTML = renderMarkdown(raw);
    }

    textEl.addEventListener('input', update);
    maxEl.addEventListener('input', update);

    update();
  </script>
</body>
</html>
